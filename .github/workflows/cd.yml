name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_REPOSITORY: registry.digitalocean.com/${{ vars.DO_REGISTRY_NAME }}/${{ vars.DO_IMAGE_REPOSITORY }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push Docker image
        run: |
          docker build -t "$IMAGE_REPOSITORY:$IMAGE_TAG" -t "$IMAGE_REPOSITORY:latest" .
          docker push "$IMAGE_REPOSITORY:$IMAGE_TAG"
          docker push "$IMAGE_REPOSITORY:latest"

      - name: Fetch current App Platform spec
        run: doctl apps get "${{ secrets.DO_APP_ID }}" --output json > app.json

      - name: Update image tag in App Platform spec
        run: |
          # Safely extract the spec from various possible structures
          jq '
            if type == "array" then
              .[0] | (.app.spec // .spec // .)
            elif has("app") then
              .app.spec
            else
              .spec // .
            end
          ' app.json > app-spec.json
          
          # Mutate the specification tags, only if fields exist
          jq --arg repo "$IMAGE_REPOSITORY" --arg tag "$IMAGE_TAG" '
            (if .services then .services |= map(if has("image") and .image.repository == $repo then .image.tag = $tag else . end) else . end) |
            (if .workers then .workers |= map(if has("image") and .image.repository == $repo then .image.tag = $tag else . end) else . end) |
            (if .jobs then .jobs |= map(if has("image") and .image.repository == $repo then .image.tag = $tag else . end) else . end)
          ' app-spec.json > app-spec-updated.json

          # Count updated components
          updates_count=$(jq --arg repo "$IMAGE_REPOSITORY" --arg tag "$IMAGE_TAG" '
            [
              ((.services // [])[]? | select(has("image") and .image.repository == $repo and .image.tag == $tag)),
              ((.workers // [])[]? | select(has("image") and .image.repository == $repo and .image.tag == $tag)),
              ((.jobs // [])[]? | select(has("image") and .image.repository == $repo and .image.tag == $tag))
            ] | length
          ' app-spec-updated.json)

          echo "Detected matched components modified: $updates_count"

          if [ "$updates_count" -eq 0 ]; then
            echo "ERROR: No image components matched IMAGE_REPOSITORY=$IMAGE_REPOSITORY in App Platform spec."
            echo "Ensure your app components use this exact repository string in DigitalOcean."
            exit 1
          fi

      - name: Deploy updated App Platform spec
        run: doctl apps update "${{ secrets.DO_APP_ID }}" --spec app-spec-updated.json --wait
